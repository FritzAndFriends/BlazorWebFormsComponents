name: Build Demo Sites

on:
  push:
    branches:
      - 'main'
      - 'v*'
    paths:
      - 'src/**'
      - 'samples/**'
      - '.github/workflows/demo.yml'
  pull_request:
    branches:
      - 'main'
      - 'v*'
    paths:
      - 'src/**'
      - 'samples/**'
      - '.github/workflows/demo.yml'
  workflow_run:
    workflows: ["Integration Tests"]
    types:
      - completed

jobs:
  build-demos:
    runs-on: ubuntu-latest
    # Only run if integration tests passed (or if triggered directly without workflow_run)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version with NBGV
        id: nbgv
        run: |
          dotnet tool install --global nbgv
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore samples/AfterBlazorServerSide/AfterBlazorServerSide.csproj

      - name: Publish Server-Side Demo
        run: dotnet publish samples/AfterBlazorServerSide/AfterBlazorServerSide.csproj --configuration Release --output ./publish/server-side

      - name: Upload Server-Side Demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-server-side-${{ steps.nbgv.outputs.version }}
          path: ./publish/server-side
